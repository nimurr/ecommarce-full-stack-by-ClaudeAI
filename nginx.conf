# ============================================
# NGINX CONFIGURATION FOR gadgetslagbe.com
# ============================================
# Place this file at: /etc/nginx/sites-available/gadgetslagbe.com
# Then symlink to: /etc/nginx/sites-enabled/gadgetslagbe.com
# ============================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Upstream for Node.js backend
upstream backend_server {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Upstream for Client (static files)
upstream client_server {
    server 127.0.0.1:5173;
}

# Upstream for Admin (static files)
upstream admin_server {
    server 127.0.0.1:5174;
}

# ============================================
# HTTP -> HTTPS REDIRECT
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name gadgetslagbe.com www.gadgetslagbe.com admin.gadgetslagbe.com api.gadgetslagbe.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# API SERVER (api.gadgetslagbe.com)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.gadgetslagbe.com;

    # SSL Certificate (Cloudflare Origin or Let's Encrypt)
    ssl_certificate /etc/ssl/certs/gadgetslagbe.com.crt;
    ssl_certificate_key /etc/ssl/private/gadgetslagbe.com.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/api-gadgetslagbe-access.log;
    error_log /var/log/nginx/api-gadgetslagbe-error.log;

    # Max upload size
    client_max_body_size 50M;

    # Serve uploaded images directly from disk
    location /public/images/ {
        alias /home/ubuntu/Project/ecommarce-full-stack-by-ClaudeAI/server/public/images/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # Proxy to Node.js backend
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache control
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint (no rate limit)
    location /api/health {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# CLIENT SERVER (gadgetslagbe.com)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gadgetslagbe.com www.gadgetslagbe.com;

    # SSL Certificate
    ssl_certificate /etc/ssl/certs/gadgetslagbe.com.crt;
    ssl_certificate_key /etc/ssl/private/gadgetslagbe.com.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/client-gadgetslagbe-access.log;
    error_log /var/log/nginx/client-gadgetslagbe-error.log;

    # Max upload size
    client_max_body_size 10M;

    # Root directory for client static files
    root /var/www/gadgetslagbe/client/dist;
    index index.html;

    # API proxy (if not using separate api subdomain)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

